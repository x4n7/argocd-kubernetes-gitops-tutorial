apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: grade-submission-helm-dev
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/x4n7/argocd-kubernetes-gitops-tutorial.git
    targetRevision: HEAD
    path: helm/grade-submission
    helm:
      valueFiles:
        - values-dev.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: grade-helm-demo
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
    - CreateNamespace=true